name: Daily Commit by 23f2002684@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Step with email 23f2002684@ds.study.iitm.ac.in
      run: echo "Running daily commit for 23f2002684@ds.study.iitm.ac.in"
      
    - name: Create commit file
      run: |
        echo "# Daily update $(date)" > README.md
        
    - name: Git commit and push
      run: |
        git config user.name "23f2002684@ds.study.iitm.ac.in"
        git config user.email "23f2002684@ds.study.iitm.ac.in"
        git add .
        git commit -m "Daily commit $(date)" || exit 0
        git push
